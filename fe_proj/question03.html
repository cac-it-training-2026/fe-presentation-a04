<!doctype html>
<html lang="ja">
	

    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
       
    </head>
    <body>
        <div class="quiz-container">

            <h3 class="quiz-question">問題3:ブラックボックステストの説明として、正しいものを1つ選びなさい。 </h3>

            <form class="quiz-options">
                <label>

                    <input type="radio" name="q1" value="1" /> 
                    1. ソースコードの条件分岐や処理経路を確認し、全ての処理が実行されるかを検証するテスト


                </label>
                <label>

                    <input type="radio" name="q1" value="2" />
                     2. プログラム内部の繰り返し処理や判定処理を確認し、コードに誤りがないか調べるテスト


                </label>
                <label>

                    <input type="radio" name="q1" value="3" /> 
                    3. システムに入力を行い、仕様通りの結果が出力されるかを確認するテスト


                </label>
                <label>

                    <input type="radio" name="q1" value="4" />
                     4. プログラム内部の構造を確認しながら、命令文や分岐が正しく動作しているかを調べるテスト


                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. Hyper Text Markup Language</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        HTMLは「Hyper Text Markup
                        Language（ハイパーテキスト・マークアップ・ランゲージ）」の略です。Webページの構造を作成するための言語として使用されます。
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
