<!doctype html>
<html lang="ja">
	

    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
       
    </head>
    <body>
        <div class="quiz-container">

            <h3 class="quiz-question">問題3:ブラックボックステストの説明として、正しいものを1つ選びなさい。</h3>

    <button class="quiz-option"  type="button" onclick="checkAnswer(1)">
       1. ソースコードの条件分岐や処理経路を確認し、全ての処理が実行されるかを検証するテストである。
    </button>

    <button class="quiz-option"  type="button" onclick="checkAnswer(2)">
      2. プログラム内部の繰り返し処理や判定処理を確認し、コードに誤りがないか調べるテストである。

    </button>

    <button class="quiz-option"  type="button" onclick="checkAnswer(3)">
      3. システムに入力を行い、仕様通りの結果が出力されるかを確認するテストである。

    </button>

    <button class="quiz-option"  type="button" onclick="checkAnswer(4)">
       4. プログラム内部の構造を確認しながら、命令文や分岐が正しく動作しているかを調べるテストである。

    </button>

    <p id="result"></p>



 

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：3. システムに入力を行い、仕様通りの結果が出力されるかを確認するテストである。
</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        ブラックボックステストは、プログラム内部ではなく「入力に対して正しい結果が返るか」を確認するテストのことである。
                        一方、ホワイトボックステストは、プログラム内部の構造や処理の流れを確認しながら行うテストであり、
                        条件分岐や繰り返し処理などが正しく実行されるかを確認する。そのため①、②、④はホワイトボックステストの説明になる。
                    </p>
                </div>
            </details>
         <div class="navigation">
			 <a href="question01.html" class="prev-btn">← 前へ</a>
    			   
			   </div>
			   </div>
			    <script>

    function checkAnswer(answer) {

      const result = document.getElementById("result");

      if(answer === 3) {

        result.textContent = "⭕ 正解！";
        result.style.color = "green";

    } else {

        result.textContent = "❌ 不正解";
        result.style.color = "red";

    }

}


  </script>
    </body>
</html>
