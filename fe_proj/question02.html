<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
         <button class="choice" onclick="checkAnswer(1)">
    システム全体の操作性を確認する
  </button>

  <button class="choice" onclick="checkAnswer(2)">
    部品同士を連携した際のデータ受け渡しの不具合を見つける
  </button>

  <button class="choice" onclick="checkAnswer(3)">
    画面デザインの見やすさを確認する
  </button>

  <button class="choice" onclick="checkAnswer(4)">
    利用者マニュアルの内容を確認する
  </button>

  <p id="result"></p>

  <script>
    function checkAnswer(answer) {

      const result = document.getElementById("result");

      if(answer === 2) {
        result.textContent = "正解！";
      } else {
        result.textContent = "不正解...";
      }

    }
  </script>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. 部品同士を連携した際のデータ受け渡しの不具合を見つける</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        結合テストは、複数の部品を組み合わせた際のデータ受け渡しや連携不具合を確認するテストだからである。
                        ①はシステム全体の操作性確認でありシステムテスト寄り。③は画面の見やすさを確認するUI評価。④はマニュアル確認であり、システム動作のテストではないため不適切である。
                        
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
