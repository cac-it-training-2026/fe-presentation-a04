<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題1: 単体テストの説明として、最も適切なものはどれか。</h3>

    		<button class="quiz-option"  type="button" onclick="checkAnswer(1)">
				 1. システム全体を対象に、本番環境に近い条件で動作を確認するテストである。
            </button>

    		<button class="quiz-option"  type="button" onclick="checkAnswer(2)">
		 		 2. 利用者の要求を満たしているかを確認するため、実際の業務担当者が実施するテストである。
    		</button>

    		<button class="quiz-option"  type="button" onclick="checkAnswer(3)">
				 3. 1つの機能や部品ごとに動作確認を行うテストである。
    		</button>

    		<button class="quiz-option"  type="button" onclick="checkAnswer(4)">
				 4. システム運用中に発生した障害の原因を分析し、再発防止策を検討する活動である。
            </button>

    		<p id="result"></p>


            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：3.1つの機能や部品ごとに動作確認を行うテストである。 </strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                       単体テストは、1つの機能や部品ごとに動作確認を行うテストです。一般的にホワイトボックステストが中心となり、開発者が実施します。
                       <br>①はシステムテストの説明です。<br>②受入テストの説明になります。受入テストとはシステムテストの後に利用者が行うテストになります。<br>④はテストではなく障害管理・原因分析（インシデント対応）に関する活動です。
                    </p>
                </div>
            </details>
               <div class="navigation">
    			   <a href="question02.html" class="next-btn">次へ →</a>
			   </div>
        </div>
          <script>

    function checkAnswer(answer) {

      const result = document.getElementById("result");

      if(answer === 3) {

        result.textContent = "⭕ 正解！";
        result.style.color = "green";

    } else {

        result.textContent = "❌ 不正解";
        result.style.color = "red";

    }

}


  </script>
    </body>
</html>
