<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題1: 単体テストの説明として、最も適切なものはどれか。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. システム全体を対象に、本番環境に近い条件で動作を確認するテストである。
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. 利用者の要求を満たしているかを確認するため、実際の業務担当者が実施するテストである。
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. プログラムやモジュール単位で、内部ロジックや分岐処理が正しく動作することを確認するテストである。
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. システム運用中に発生した障害の原因を分析し、再発防止策を検討する活動である。
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. Hyper Text Markup Language</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        HTMLは「Hyper Text Markup
                        Language（ハイパーテキスト・マークアップ・ランゲージ）」の略です。Webページの構造を作成するための言語として使用されます。
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
